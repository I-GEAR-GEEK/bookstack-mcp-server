name = "bookstack-mcp-server"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Default vars — override in the Cloudflare dashboard as needed.
# BOOKSTACK_BASE_URL and BOOKSTACK_API_TOKEN must be set in the dashboard (or via wrangler secret put).
[vars]
SERVER_NAME = "bookstack-mcp-server"
SERVER_VERSION = "1.0.0"
LOG_LEVEL = "info"
BOOKSTACK_TIMEOUT = "30000"
RATE_LIMIT_REQUESTS_PER_MINUTE = "60"
RATE_LIMIT_BURST_LIMIT = "10"
