name = "bookstack-mcp-server"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Public (non-secret) vars — override these in the Cloudflare dashboard or via wrangler.toml
[vars]
BOOKSTACK_BASE_URL = "https://your-bookstack.example.com/api"
SERVER_NAME = "bookstack-mcp-server"
SERVER_VERSION = "1.0.0"
LOG_LEVEL = "info"
NODE_ENV = "production"
BOOKSTACK_TIMEOUT = "30000"
RATE_LIMIT_REQUESTS_PER_MINUTE = "60"
RATE_LIMIT_BURST_LIMIT = "10"

# BOOKSTACK_API_TOKEN must be set as a secret (never in this file):
#   wrangler secret put BOOKSTACK_API_TOKEN
